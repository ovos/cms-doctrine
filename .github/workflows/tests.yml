name: Tests

on:
  pull_request: ~
  push:
    branches:
      - master

jobs:

  ubuntu:
    name: "Ubuntu PHP ${{ matrix.php }}${{ matrix.allow-failure && ' (allowing failures - php version not supported yet)' || '' }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['5.3', '5.4', '5.5', '5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: apc.enable_cli=1, opcache.enable=1, opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=128M
          tools: composer:v2
        env:
            fail-fast: true

      - name: Install dependencies
        run: composer install --no-dev --classmap-authoritative

      - name: "Run Tests"
        run: |
          php ./tests/run.php
        continue-on-error: "${{ matrix.allow-failure == true }}"

  windows:
    name: "Windows PHP ${{ matrix.php }}${{ matrix.allow-failure && ' (allowing failures - php version not supported yet)' || '' }}"
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf input
          git config --global core.eol lf

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, pdo_sqlite
          ini-values: apc.enable_cli=1, opcache.enable=1, opcache.jit=tracing, opcache.jit_buffer_size=128M
          tools: composer:v2
        env:
            fail-fast: true

      - name: Install dependencies
        run: composer install --no-dev --classmap-authoritative

      - name: "Run Tests"
        run: |
          php ./tests/run.php
        continue-on-error: "${{ matrix.allow-failure == true }}"
