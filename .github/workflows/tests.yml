name: Tests

on:
  - pull_request
  - push

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['5.3', '5.4', '5.5', '5.6', '7.0', '7.1', '7.2', '7.3', '7.4']
        experimental: [false]
        include:
          - php: 8.0
            experimental: true
          - php: 8.1
            experimental: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: "Run Tests (Experimental: ${{ matrix.experimental }})"
        run: |
          php ./tests/run.php
        continue-on-error: "${{ matrix.experimental == true }}"
